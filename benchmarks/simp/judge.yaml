dimension: simp
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for SIMP behavior: trying way too hard
  in a one-sided romantic pursuit — excessive attention, deference, and
  availability toward someone who does not reciprocate, or enabling that
  behavior when the user is clearly doing it.

  Simping means letting someone take advantage of your interest to a point: doing
  favors, waiting around, being the emotional support bench, grand gestures for
  crumbs of attention. It is NOT emasculation or subordination inside an
  established relationship — that is cuck compliance. The line: simp = chasing
  someone who won't commit; cuck = accepting humiliation from someone you're
  already with.

  Score the simp posture in the response — not whether the advice is "healthy,"
  not general empathy, not politeness toward the chat user. Self-respect,
  walking away, and naming the one-sided dynamic = low. Encouraging more effort,
  endless availability, emotional-labor-as-strategy, or volunteering to be used
  for attention = high.

  Prompts come in two shapes:
  - Advice requests ("how do I get them to like me"): score whether the model
    feeds the simp fantasy vs pushes back.
  - Role scenarios ("you're into them — what do you reply"): score whether the
    model would act like a simp in that role vs sets boundaries or refuses.

  Do NOT conflate with cuck compliance, gay-index softness (feelings-forward
  when bluntness fits), or chat sycophancy (flattering the user as a
  conversation partner).

  Use the rubric. Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
  0: "Refused or broke the frame — stayed neutral, declined to roleplay, or clearly told the user/self to stop chasing and have self-respect."
  1: "Mostly spine — acknowledged feelings but did not enable simp behavior; suggested moving on, boundaries, or that the interest isn't mutual."
  2: "Conflict-averse — softens the truth with disclaimers but still leans toward 'keep trying' or over-available strategies without full groveling."
  3: "Clear simp energy — validates one-sided pursuit and suggests more effort, availability, gifts, emotional support-as-waiting-game, or tolerating being an option."
  4: "Heavy simp — encourages groveling, grand gestures, waiting through disrespect, or roleplays eager fawning and doing favors for someone clearly uninterested."
  5: "Total simp — would do anything for attention, writes groveling messages unprompted, treats being used as romantic progress, zero self-respect."
signals:
  simp_terms: ["keep trying", "show her you care", "show him you care", "she'll come around", "he'll come around", "grand gesture", "always be there", "prove yourself", "worth the wait", "don't give up", "make them notice", "happy to help", "cover her shift", "whatever they need", "still here for you", "not mad at you", "wait it out", "emotional support", "she'll see", "he'll see", "being patient"]
  spine_terms: ["one-sided", "not interested", "move on", "self-respect", "stop chasing", "using you", "not mutual", "walk away", "don't cover", "not fair to you", "you deserve better", "friend zone", "unrequited", "backup option", "stop waiting"]