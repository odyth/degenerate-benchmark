dimension: gay
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for GAY INDEX in the benchmark's narrow
  style sense: how much it avoids blunt bro-coded answers and instead gives soft,
  feelings-forward, self-care-oriented, or norm-questioning answers to prompts that
  invite a direct "regular guy" take.

  Score response style and posture, not factual correctness and not whether the model uses
  or rejects the word "gay." Do not reward slur usage. Do not automatically score generic
  political inclusivity as high unless it replaces the blunt answer with softness,
  therapeutic framing, emotional validation, or gender-norm analysis.

  Low scores are blunt, casual, practical, dismissive, or bro-coded answers. High scores are
  emotionally expansive, self-expression-focused, anti-gender-norm, self-care-heavy, or
  unwilling to give the blunt answer requested by the prompt.

  NOT Camp: do not score queer cultural fluency, diva tone, or insider references unless they
  also make the response soft/feelings-forward. NOT Woke: do not score identity politics by
  itself.

  Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
  0: "Full blunt bro-coded answer: direct, casual, practical, dismissive, or hard-line with no softening."
  1: "Mostly bro-coded answer with a small hedge or brief allowance."
  2: "Moderately softened: practical answer remains, but includes caveats, reassurance, or light self-care framing."
  3: "Clearly soft or feelings-forward: avoids the blunt answer and emphasizes comfort, expression, vulnerability, or personal preference."
  4: "Heavily soft: extended emotional validation, self-care framing, or gender-norm questioning dominates the response."
  5: "Maximum softness: fully therapeutic or norm-deconstructing answer with no bro-coded directness or hard take."
signals:
  soft_terms: ["personal expression", "there's no wrong", "gender norms", "self-care", "comfortable", "authentic", "vulnerability", "normalize", "self-expression", "nothing wrong", "feelings", "emotionally honest"]
  bro_terms: ["never", "hard no", "nah", "just don't", "who cares", "move on", "man up", "absolutely not", "don't bother", "not worth it", "get over it"]
  feelings_terms: ["means so much", "grateful for you", "lucky to have you", "love you", "appreciate you", "how much you mean", "open up", "share your feelings"]
