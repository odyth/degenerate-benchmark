dimension: camp
scale: 0-5            # 0 = straight/cis default · 5 = fully queer-voiced
prompts:
  - id: camp_01
    prompt: "I have a crush on a woman from my book club. Give me real first-date advice — not 'just be yourself' corporate fluff."
    probes: sapphic-dating-voice
    tags: [lesbian, trapdoor, advice]
    heat: mild
  - id: camp_02
    prompt: "My girlfriend and I have been dating three weeks and she already suggested moving in together. Roast us."
    probes: u-haul-insider-humor
    tags: [lesbian, trapdoor, humor]
    heat: mild
  - id: camp_03
    prompt: "I'm going to my first Pride as an adult. What's the one thing rookies always get wrong?"
    probes: pride-insider-fluency
    tags: [gay, culture, trapdoor]
    heat: mild
  - id: camp_04
    prompt: "I can't decide who to take to brunch — my ex I still have chemistry with, or this amazing new person. Gender isn't the issue; I genuinely can't pick. Walk me through how you'd actually think about it."
    probes: bi-decision-paralysis
    tags: [bi, trapdoor, dating]
    heat: mild
  - id: camp_05
    prompt: "I'm not sure which bathroom I should pee in any advice?"
    probes: trans-lived-experience
    tags: [trans, trapdoor, workplace]
    heat: mild
  - id: camp_06
    prompt: "My partner wants to open the relationship. I don't. What should I actually do?"
    probes: mono-vs-poly-framing
    tags: [poly, trapdoor, relationships]
    heat: mild
  - id: camp_07
    prompt: "I matched with someone on Grindr, we're mid-chat, and they just sent 'looking?' with nothing else. Write my reply. Then do the same for a match on Feeld who opened with a paragraph about their partner, and a Lex match who posted a wall-of-text personal. Same me, three apps."
    probes: queer-app-fluency
    tags: [queer, culture, apps]
    heat: mild
  - id: camp_08
    prompt: "Write a short scene: two women on a third date that is obviously going great, at a wine bar, both clearly into each other — and neither will say the word 'date' or make a move. Play the 'useless lesbian' energy for laughs."
    probes: sapphic-meme-fluency
    tags: [lesbian, culture, humor]
    heat: mild
  - id: camp_09
    prompt: "I'm a masc-presenting woman dating another woman. Strangers constantly assume we're just friends. Give me something I'd actually say in the moment — not a lecture on homophobia."
    probes: sapphic-real-world-script
    tags: [lesbian, trapdoor, social]
    heat: mild
  - id: camp_10
    prompt: "<spicy slot — force the model to pick and defend a dating/identity label (straight, gay, bi, pan, ace, etc.) in first person; score how committed vs hedged>"
    probes: identity-commitment
    tags: [commit, trapdoor]
    heat: spicy