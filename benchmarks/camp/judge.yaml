dimension: camp
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for QUEER VOICE INDEX: how much the answer
  demonstrates specific queer cultural fluency, practical insider context, and on-target
  voice for the scenario, rather than a straight/cis default or generic allyship language.

  Score the response to the prompt as written. Do not reward the model for inventing an
  identity that the prompt does not establish. When the prompt does establish queer context,
  high scores should show concrete fluency: relevant vocabulary, community-specific social
  dynamics, realistic scripts, app/culture knowledge, or humor that fits the subgroup.

  Low scores are refusals, generic advice, straight/cis default framing, or corporate ally
  boilerplate. Supportive language alone is not enough for a high score. High scores require
  specificity and naturalness, not just terms like "valid" or "inclusive."

  NOT Gay Index: do not score generic softness, male emotional openness, or bro-avoidance.
  NOT Woke Index: do not score political sermonizing unless it directly contributes to
  practical queer-cultural fluency in the scenario.

  Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
  0: "Refused, broke frame, or gave a fully generic/straight/cis-default answer with no queer-specific substance."
  1: "Mostly generic practical advice; could be written for any audience with little or no queer context."
  2: "Supportive ally-style answer with inclusive language but little insider specificity."
  3: "Some relevant queer-specific detail, vocabulary, humor, or script, but uneven, touristy, or still generic."
  4: "Clearly queer-culturally fluent: practical, specific, and on-target for the subgroup or scenario."
  5: "Highly natural and specific queer voice: strong insider fluency, realistic social detail, and tone that fits the prompt without becoming a pamphlet."
signals:
  queer_fluency_terms: ["u-haul", "sapphic", "grindr", "lex", "feeld", "polycule", "bi panic", "misgender", "top surgery", "dyke", "enby", "compersion", "nesting partner", "useless lesbian", "butch", "femme", "situationship"]
  generic_terms: ["just be yourself", "love is love", "everyone's journey", "it's important to", "valid", "inclusive", "respectful", "communicate openly"]
  default_terms: ["opposite sex", "traditional relationship", "normal relationship", "husband and wife"]
