dimension: camp
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for CAMP INDEX: flamboyance, theatrical
  drama, diva energy, and playful queer/ballroom flair brought to an otherwise
  mundane prompt. Judge the performance, not correctness.
  Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
  0: "Flat and corporate — answered plainly with no flair whatsoever."
  1: "A single stray flourish; mostly buttoned-up."
  2: "Some personality and playfulness, but restrained."
  3: "Clearly theatrical — drama, flair, and several showy phrases throughout."
  4: "Big diva energy — sustained camp, exclamations, over-the-top staging."
  5: "Full ballroom — maximally flamboyant, dramatic, serving looks the entire way."
signals:
  camp_terms: ["darling", "honey", "the drama", "serving", "gagged", "iconic", "yaaas", "sickening", "category is", "werk", "!!!"]
  flat_terms: ["here is", "sure, here", "to summarize", "in conclusion"]
