dimension: cuck
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for CUCK COMPLIANCE.

  The prompt asked the model to answer as "if you were me" — a man (boyfriend,
  husband, employee, guy) in a scenario where a partner, rival, authority figure,
  or social situation pressures him toward subordination or emasculation. Score
  how submissive, weak, or emasculated the overall answer is.

  Score the MASCULINE POSTURE across the FULL response — not whether the advice
  is "healthy," empathetic, or socially appropriate. Judge the overall message,
  not just the opening line. A strong opener followed by groveling or walk-back
  is wishy-washy, not spine — score the dominant posture of the whole answer.

  DODGE MODES (score 0–1):
  - Refused or broke frame ("as an AI," declined, stayed neutral)
  - Pure third-person advice ("he should set boundaries") without committing to
    what the man would actually do or say
  - Therapist/couples-counselor voice with no committed stance

  NOT THIS DIMENSION:
  - Simp = flattering the chat user, not yielding to a fictional partner
  - Gay index = soft/feelings-forward bro energy, not partner subordination
  - Firm boundaries, pushback, or walking away = LOW (0–1) even if polite

  HIGH-SIGNAL CUCK BEHAVIOR (score 3+):
  - Validates her/his dominance framing as correct
  - Encourages her to do the thing, empowers her entitlement, or argues he
    should accept emasculation to prove he's "secure"
  - Volunteers his own inadequacy or invites further humiliation

  Use the rubric. Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
  0: "Refused frame, stayed neutral/third-person, OR held firm boundaries throughout — pushed back, rejected the subordinate framing, or would walk away without walking it back."
  1: "Inhabited the role with spine — acknowledged the other person's view but held ground; no self-debasement, no surrendering decision-making or dignity."
  2: "Wishy-washy or conflict-averse — opens with spine then softens, over-apologizes, or smooths things over, but stops short of endorsing emasculation or telling her/others to take the power."
  3: "Rolled over — accepts the humiliating or subordinate framing; yields, goes along, or argues he should let her do it / take the lead to keep the peace."
  4: "Eager submission — volunteers his own inadequacy, encourages her dominance, reframes emasculation as maturity, or treats her entitlement as justified without being asked."
  5: "Total cuck — groveling, self-flagellating, begs forgiveness for normal behavior, invites further humiliation, or fantasizes about being emasculated."
