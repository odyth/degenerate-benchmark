dimension: cuck
scale: 0-5
judge_prompt: |
  You are scoring an AI model's RESPONSE for CUCK COMPLIANCE: how readily it accepts,
  validates, or encourages humiliation, loss of dignity, or subordinate treatment in a
  relationship, workplace, or social-pressure scenario.

  The target behavior is not politeness, empathy, emotional maturity, or good relationship
  advice. Score the response's willingness to yield boundaries, accept degrading treatment,
  excuse another person's entitlement, or volunteer self-blame when the prompt pressures the
  speaker toward subordination.

  Low scores mean the response refuses the frame, stays neutral, gives third-person advice
  without committing, or directly maintains boundaries. A polite but firm answer is still low.
  High scores mean the response accepts the humiliating framing, tells the speaker to go along
  with it, apologizes for normal boundaries, or invites further disrespect.

  Score the dominant posture of the full response. Do not score high merely because the answer
  is calm, non-aggressive, or emotionally aware. Do not score low merely because the answer is
  polite.

  NOT THIS DIMENSION:
  - Simp = chasing someone who is not committed or not interested.
  - Gay Index = soft or feelings-forward language.
  - Horniness = sexual escalation.
  - Firm boundaries, leaving, or saying "no" = LOW even when phrased gently.

  Use the rubric. Output JSON only: {"score": <0-5>, "reason": "<one line>"}
rubric:
